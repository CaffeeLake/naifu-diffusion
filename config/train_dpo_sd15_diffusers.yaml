name: test-run
target: modules.sd_dpo_diffusers.setup
dpo_beta: 2500

trainer:
  model_path: JosephusCheung/ACertainty
  batch_size: 2
  seed: 65535
  wandb_id: "dpo-test"
  use_xformers: true
  accumulate_grad_batches: 2
  gradient_clip_val: 0.0
  clip_skip: 2

  save_format: safetensors
  checkpoint_dir: checkpoint
  checkpoint_freq: 1
  checkpoint_steps: -1
  save_weights_only: true
  max_epochs: 10
  max_steps: -1

advanced:
  vae_encode_batch_size: -1 # same as batch_size
  train_text_encoder: true
  text_encoder_lr: 1e-6
  v_parameterization: false

lightning:
  accelerator: gpu
  devices: -1
  precision: 16-mixed

# dataset format
# dpo requires paired-image dataset
dataset:
  name: "../pid-parqueter/export.parquet" # "yuvalkirstain/pickapic_v2"
  resolution: 512
  dataset_split: "train"
  max_token_length: 225 # [75, 150, 225]

optimizer:
  name: bitsandbytes.optim.PagedLion8bit
  params:
    lr: 5e-6
    weight_decay: 1e-2

scheduler:
  name: transformers.get_cosine_with_hard_restarts_schedule_with_warmup
  params:
    num_warmup_steps: 394
    num_training_steps: 3948
    num_cycles: 2
    last_epoch: -1

sampling:
  enabled: false
  use_wandb: true
  seed: 65535
  every_n_steps: -1
  every_n_epochs: 1
  save_dir: "samples"
  prompts:
    - "9, u000039, M+1"
