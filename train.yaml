name: test-run

trainer:
  model_path: "../stable-diffusion-v1-5/"
  batch_size: 1
  resolution: 512
  center_crop: false
  gradient_checkpointing: true
  clip_skip: 2
  seed: 65535

  use_ema: false
  use_hivemind: false
  use_xformers: true
  lr_scale: sqrt
  train_text_encoder: true
  attention_slicing: false
  vae_slicing: false

  offset_noise: false
  offset_noise_val: 0.1
  min_snr: false
  min_snr_val: 5

checkpoint:
  monitor: "epoch"
  dirpath: checkpoint
  filename: "ft-epoch{epoch:02d}-loss{train_loss:.6f}"
  auto_insert_metric_name: false
  every_n_epochs: 1
  save_top_k: -1
  mode: "max"
  save_last: false
  save_weights_only: false
  extended:
    save_fp16_weights: true

lightning:
  accelerator: gpu
  devices: -1
  max_epochs: 10
  precision: bf16-mixed
  log_every_n_steps: 1
  accumulate_grad_batches: 2
  gradient_clip_val: 0.0

dataset:
  img_path: "../font2png/exports/"
  tag_processor: data.processors.shuffle_prompts
  center_crop: false
  ucg: 0.0
  debug_arb: false
  allow_duplicates: false
  cache_latents: false
  cache_bsz: 8
  cache_dir: cache

optimizer:
  name: dadaptation.DAdaptLion
  params:
    lr: 1e-0
    # weight_decay: 1e-2
    # eps: 1e-8

lr_scheduler:
  name: transformers.get_cosine_schedule_with_warmup
  params:
    num_warmup_steps: 210
    num_training_steps: 2100
    last_epoch: -1

monitor:
  wandb_id: ""
  huggingface_repo: ""
  hf_auth_token: ""
  store_checkpoints: true

sampling:
  enabled: false
  use_wandb: true
  every_n_steps: -1
  every_n_epochs: 1
  save_dir: "samples"
  seed: 65535
  height: 512
  width: 512
  steps: 25
  cfg_scale: 15
  negative_prompts:
    - ""
  prompts:
    - ""

# arb config will be calculated automatically if not specified
# to override, uncomment and specify values
arb:
  enabled: false
  debug: false
  base_res: [512, 512]
  max_size: [768, 512]
  divisible: 64
  max_ar_error: 4
  min_dim: 256
  dim_limit: 1024
